<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For My Cutiee 💕</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff6fa5,#ffc3e6);
    font-family: 'Poppins', sans-serif;
    overflow:hidden;
}

/* Floating Hearts */
.heart{
    position:absolute;
    color:white;
    font-size:20px;
    animation: float 6s linear infinite;
    opacity:0.7;
}

@keyframes float{
    0%{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
    }
    50%{ opacity:1; }
    100%{
        transform:translateY(-10vh) scale(1.2);
        opacity:0;
    }
}

.container{
    text-align:center;
    position:relative;
    z-index:2;
}

/* Romantic Text */
.love{
    font-size:70px;
    font-weight:bold;
    color:white;
    text-shadow:0 0 15px rgba(255,255,255,0.8);
    letter-spacing:8px;
}

.love span{
    opacity:0;
    display:inline-block;
    animation: fadeUp 0.6s forwards;
}

.love span:nth-of-type(1){animation-delay:0.3s;}
.love span:nth-of-type(2){animation-delay:0.6s;}
.love span:nth-of-type(3){animation-delay:0.9s;}
.love span:nth-of-type(4){animation-delay:1.2s;}
.love span:nth-of-type(5){animation-delay:1.5s;}
.love span:nth-of-type(6){animation-delay:1.8s;}
.love span:nth-of-type(7){animation-delay:2.1s;}
.love span:nth-of-type(8){animation-delay:2.4s;}
.love span:nth-of-type(9){animation-delay:2.7s;}
.love span:nth-of-type(10){animation-delay:3s;}
.love span:nth-of-type(11){animation-delay:3.3s;}
.love span:nth-of-type(12){animation-delay:3.6s;}


@keyframes fadeUp{
    0%{transform:translateY(-40px);opacity:0;}
    100%{transform:translateY(0);opacity:1;}
}

/* Button */
.button{
    margin-top:30px;
    opacity:0;
    animation:showBtn 1s forwards;
    animation-delay:4s;
}

@keyframes showBtn{
    to{opacity:1;}
}

.button label{
    padding:12px 28px;
    background:white;
    color:#ff4e8a;
    font-weight:bold;
    border-radius:30px;
    cursor:pointer;
    transition:0.4s;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.button label:hover{
    transform:scale(1.1);
    background:#ffe6ef;
}

#open{
    display:none;
}

/* Glass Love Letter */
.letter{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    width:320px;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(15px);
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
    transition:0.6s;
    text-align:center;
    color:black;
}

#open:checked ~ .letter{
    transform:translate(-50%,-50%) scale(1);
}

.letter h2{
    margin-bottom:15px;
    font-size:24px;
    text-shadow:0 0 10px rgba(255,255,255,0.8);
}

.letter p{
    font-size:16px;
    line-height:1.6;
}
</style>
</head>

<body>

<!-- Floating Hearts -->
<script>
for(let i=0;i<20;i++){
    let heart=document.createElement("div");
    heart.innerHTML="❤";
    heart.classList.add("heart");
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(3+Math.random()*5)+"s";
    heart.style.fontSize=(15+Math.random()*25)+"px";
    document.body.appendChild(heart);
}
</script>

<div class="container">

<div class="love">
<span>I</span><br>
<span>L</span>
<span>O</span>
<span>V</span>
<span>E</span><br>
<span>U</span><br>
<span>B</span>
<span>U</span>
<span>B</span>
<span>B</span>
<span>I</span>
</div>

<div class="button">
<label for="open">Open It Bubbu!💌</label>
</div>

<input type="checkbox" id="open">

<div class="letter">
<h2>
	<font color=RED>M</font>y <font color=RED>B</font>aby❤️
</h2>
<p>
You are the most beautiful part of my life.<br>
Every moment with you feels magical ✨<br>
I am truly grateful for you.<br><br>
Forever & Always 💖<br>
I LOVE YOU SO MUCH MY BABY!!! 💖
</p>
</div>

</div>

</body>
</html>
